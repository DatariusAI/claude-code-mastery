.ts","target":"validator/utils.ts"},{"source":"validator/utils.ts","target":"types.ts"},{"source":"validator/utils.ts","target":"utils/types.ts"},{"source":"validator/validator.ts","target":"context.ts"},{"source":"validator/validator.ts","target":"helper/cookie/index.ts"},{"source":"validator/validator.ts","target":"http-exception.ts"},{"source":"validator/validator.ts","target":"types.ts"},{"source":"validator/validator.ts","target":"utils/body.ts"},{"source":"validator/validator.ts","target":"utils/buffer.ts"},{"source":"validator/validator.ts","target":"validator/utils.ts"}];

const colorMap = {
  core: '#4361ee', middleware: '#2ec4b6', router: '#ff9f1c', utils: '#8d99ae',
  adapter: '#9b5de5', helper: '#f15bb5', jsx: '#00f5d4', client: '#fee440',
  validator: '#c1121f', preset: '#c1121f', request: '#4361ee'
};
function nodeColor(d) { return colorMap[d.dir] || '#c1121f'; }

const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select('svg');
const g = svg.append('g');

const zoom = d3.zoom().scaleExtent([0.1, 6]).on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

svg.append('defs').selectAll('marker')
  .data(['arrow'])
  .join('marker')
    .attr('id', 'arrow')
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 20)
    .attr('refY', 0)
    .attr('markerWidth', 6)
    .attr('markerHeight', 6)
    .attr('orient', 'auto')
  .append('path')
    .attr('fill', '#334')
    .attr('d', 'M0,-5L10,0L0,5');

const simulation = d3.forceSimulation(graphNodes)
  .force('link', d3.forceLink(graphLinks).id(d => d.id).distance(80))
  .force('charge', d3.forceManyBody().strength(-120))
  .force('center', d3.forceCenter(width / 2, height / 2))
  .force('collision', d3.forceCollide().radius(16));

const link = g.append('g')
  .selectAll('line')
  .data(graphLinks)
  .join('line')
    .attr('stroke', '#1e2d4a')
    .attr('stroke-width', 1)
    .attr('marker-end', 'url(#arrow)');

const node = g.append('g')
  .selectAll('circle')
  .data(graphNodes)
  .join('circle')
    .attr('r', d => {
      const incoming = graphLinks.filter(l => (l.target.id || l.target) === d.id).length;
      return Math.max(4, Math.min(12, 3 + incoming * 0.5));
    })
    .attr('fill', nodeColor)
    .attr('stroke', '#1a1a2e')
    .attr('stroke-width', 1.5)
    .style('cursor', 'grab')
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    );

const label = g.append('g')
  .selectAll('text')
  .data(graphNodes)
  .join('text')
    .text(d => d.label.replace('.ts', ''))
    .attr('fill', '#fff')
    .attr('font-size', 9)
    .attr('dx', 10)
    .attr('dy', 3)
    .style('pointer-events', 'none')
    .style('user-select', 'none');

const tooltip = d3.select('#tooltip');
node.on('mouseover', (e, d) => {
  tooltip.style('display', 'block').html('<strong>src/' + d.id + '</strong><br>dir: ' + d.dir);
  const connected = new Set();
  graphLinks.forEach(l => {
    const sid = l.source.id || l.source;
    const tid = l.target.id || l.target;
    if (sid === d.id) connected.add(tid);
    if (tid === d.id) connected.add(sid);
  });
  connected.add(d.id);
  node.attr('opacity', n => connected.has(n.id) ? 1 : 0.15);
  label.attr('opacity', n => connected.has(n.id) ? 1 : 0.08);
  link.attr('stroke', l => ((l.source.id||l.source)===d.id||(l.target.id||l.target)===d.id) ? '#e94560' : '#1e2d4a')
      .attr('stroke-width', l => ((l.source.id||l.source)===d.id||(l.target.id||l.target)===d.id) ? 2 : 1)
      .attr('opacity', l => ((l.source.id||l.source)===d.id||(l.target.id||l.target)===d.id) ? 1 : 0.1);
})
.on('mousemove', e => { tooltip.style('left', (e.clientX + 14) + 'px').style('top', (e.clientY - 10) + 'px'); })
.on('mouseout', () => {
  tooltip.style('display', 'none');
  node.attr('opacity', 1);
  label.attr('opacity', 1);
  link.attr('stroke', '#1e2d4a').attr('stroke-width', 1).attr('opacity', 1);
});

simulation.on('tick', () => {
  link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  node.attr('cx', d => d.x).attr('cy', d => d.y);
  label.attr('x', d => d.x).attr('y', d => d.y);
});

d3.select('#search').on('input', function() {
  const q = this.value.toLowerCase().trim();
  if (!q) {
    node.attr('opacity', 1).attr('stroke', '#1a1a2e').attr('stroke-width', 1.5);
    label.attr('opacity', 1).attr('fill', '#fff');
    link.attr('opacity', 1);
    return;
  }
  const matches = new Set(graphNodes.filter(n => n.id.toLowerCase().includes(q)).map(n => n.id));
  node.attr('opacity', n => matches.has(n.id) ? 1 : 0.1)
      .attr('stroke', n => matches.has(n.id) ? '#e94560' : '#1a1a2e')
      .attr('stroke-width', n => matches.has(n.id) ? 3 : 1.5);
  label.attr('opacity', n => matches.has(n.id) ? 1 : 0.06)
       .attr('fill', n => matches.has(n.id) ? '#e94560' : '#fff');
  link.attr('opacity', l => {
    const sid = l.source.id || l.source;
    const tid = l.target.id || l.target;
    return (matches.has(sid) || matches.has(tid)) ? 0.8 : 0.05;
  });
});

setTimeout(() => svg.transition().duration(800).call(zoom.transform, d3.zoomIdentity.translate(width*0.1, height*0.1).scale(0.85)), 1500);
</script>
