# ============================================================
# CI/CD Pipeline — Claude Code Capstone (Python)
# Generated via Claude Code — 6-stage pipeline
# ============================================================

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  EMAIL_PROVIDER: mock
  FLASK_ENV: test

jobs:
  # ── Stage 1: Lint ────────────────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install flake8
      - run: flake8 src/ tests/

  # ── Stage 2: Unit Tests ──────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v
      - uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: .coverage

  # ── Stage 3: Integration Tests ───────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/integration/ -v

  # ── Stage 4: Regression Tests ────────────────────────────────────────────
  regression-tests:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/regression/ -v

  # ── Stage 5: Security Audit ──────────────────────────────────────────────
  security:
    name: Security Audit (pip-audit)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt

  # ── Stage 6: Docker Build ────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Health Check
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, regression-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t capstone-py:${{ github.sha }} .
      - name: Test health check
        run: |
          docker run -d --name capstone-test \
            -p 5001:5000 \
            -e EMAIL_PROVIDER=mock \
            capstone-py:${{ github.sha }}
          sleep 5
          curl --fail http://localhost:5001/api/health
          docker stop capstone-test && docker rm capstone-test
