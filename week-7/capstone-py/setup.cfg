[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --cov=src --cov-report=term-missing --cov-fail-under=80

[coverage:run]
source = src
omit =

[coverage:report]
show_missing = True

[flake8]
max-line-length = 100
exclude = .git,__pycache__,venv,.venv
