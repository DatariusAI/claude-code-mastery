version: '3.9'

services:
  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: capstone-notification-service
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PORT=5000
      - EMAIL_PROVIDER=mock
      - LOG_LEVEL=INFO
      - MAX_RETRY_ATTEMPTS=3
      - RETRY_DELAY_SECONDS=1.0
      - SECRET_KEY=change-me-in-production
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "com.capstone.service=notification"
      - "com.capstone.version=1.0.0"
      - "com.capstone.managed-by=claude-code"

networks:
  default:
    name: capstone-network
